<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Capitol Contracts LLC / WRH Project System</title>
  <meta name="description" content="Repository showcase for Capitol Contracts LLC, What Really Happened, From the Storm to the Fire, and the WRH project system." />
  <meta http-equiv="refresh" content="0; url=./repo-showcase.html" />
  <style>
    :root {
      --bg: #05040a;
      --text: #f7f4ea;
      --muted: #c9c1d8;
      --gold: #d8b45f;
      --purple: #8f5cff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top left, rgba(143, 92, 255, 0.28), transparent 28rem),
        radial-gradient(circle at bottom right, rgba(216, 180, 95, 0.18), transparent 28rem),
        var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      text-align: center;
      padding: 24px;
    }
    main {
      width: min(720px, 100%);
      padding: 42px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 30px;
      background: rgba(17, 16, 26, 0.86);
      box-shadow: 0 24px 70px rgba(0,0,0,0.45);
    }
    .mark {
      width: 64px;
      height: 64px;
      display: grid;
      place-items: center;
      margin: 0 auto 18px;
      border: 1px solid var(--gold);
      border-radius: 999px;
      color: var(--gold);
      font-weight: 900;
    }
    h1 {
      margin: 0;
      font-size: clamp(2rem, 7vw, 4rem);
      line-height: 0.96;
      letter-spacing: -0.06em;
    }
    p {
      color: var(--muted);
      font-size: 1.08rem;
      margin: 18px auto 0;
      max-width: 560px;
    }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 28px;
      min-height: 46px;
      padding: 0 18px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--gold), #f3dda0);
      color: #0b0811;
      font-weight: 900;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <div class="mark">WRH</div>
    <h1>Capitol Contracts LLC / WRH Project System</h1>
    <p>Redirecting to the repository showcase for the What Really Happened curriculum, pilot package, memoir, article hub, and production workflow.</p>
    <a href="./repo-showcase.html">Open Repository Showcase</a>
  </main>
</body>
</html>
